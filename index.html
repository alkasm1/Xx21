<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ALM Xx21 Demo</title>
</head>
<body>

<h1>ALM Xx21 Demo</h1>

<h3>📦 System Test</h3>
<button onclick="runALMSystemTest()">Run System Test</button>

<h3>🔐 Certification</h3>
<button onclick="runCert()">Run Certification</button>

<h3>🔊 Audio Demo</h3>

<!-- مهم: id يجب أن يطابق demo.js -->
<input type="file" id="audioFile" accept="audio/*">

<!-- مهم: اسم الدالة الصحيح -->
<button onclick="runAudioDemo()">Run Audio Demo</button>

<pre id="output"></pre>

<!-- ترتيب التحميل مهم -->
<script src="./src/alm_kernel.js"></script>
<script src="./src/transports/xx21_transport.js"></script>
<script src="./src/alm_certifier.js"></script>
<script src="./src/alm_system_test.js"></script>

<!-- 🔴  -->
<script src="./demo/demo.js"></script>

<script>
async function runCert() {
  try {
    const res = await certifyALMTransport({
      text: "1 + 2 * 3", // ✅ تصحيح: text وليس data
      type: 0x02
    });

    document.getElementById("output").textContent =
      JSON.stringify(res, null, 2);

    console.log(res);

  } catch (e) {
    document.getElementById("output").textContent =
      "ERROR:\n" + e.message;

    console.error(e);
  }
}
</script>

</body>
</html>
