<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Xx21 Audio System</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
}

button,input{
  width:100%;
  margin-top:10px;
  padding:10px;
}

canvas{
  margin-top:15px;
  width:100%;
  border:1px solid #333;
}
</style>
</head>

<body>

<div class="card">

<h2>🎧 Xx21 Audio → Image System</h2>

<input type="file" id="audioInput" accept="audio/*">

<button onclick="encodeAudio()">تحويل الصوت إلى صورة</button>
<button onclick="saveImage()">حفظ الصورة</button>
<button onclick="decodeAudio()">استرجاع الصوت</button>

<canvas id="canvas"></canvas>

</div>

<script src="alm_core.js"></script>
<script src="xx21_audio.js"></script>

</body>
</html>
