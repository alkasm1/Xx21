<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM Xx21 Unified Audio</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
.container{max-width:900px;margin:auto}
.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px}
button,input{width:100%;margin-top:10px;padding:10px}
button{background:#0BA37F;color:#fff;border:none;border-radius:8px}
canvas{width:100%;margin-top:10px;border:1px solid #333}
#output{background:#000;padding:10px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>🎧 تحويل الصوت → صورة</h3>

<input type="file" id="audioInput" accept="audio/*">
<button onclick="encode()">تحويل</button>
<button onclick="saveImage()">💾 حفظ الصورة</button>

<canvas id="canvas"></canvas>
</div>

<div class="card">
<h3>📥 استرجاع من صورة</h3>

<input type="file" id="imageInput" accept="image/png">
<button onclick="decode()">استرجاع الصوت</button>

<div id="output"></div>
</div>

</div>

<script>

/* =========================
   CHECKSUM
========================= */
function checksum(bytes){
  let s = 0;
  for(let b of bytes) s = (s + b) % 1000000007;
  return s;
}

/* =========================
   WRITE IMAGE (ALM)
========================= */
function writeImage(bytes, header){

  const size = 512;
  const canvas = document.getElementById("canvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  const img = ctx.createImageData(size,size);
  const data = img.data;

  const write = (p,val)=>{
    const g = 255 - val;
    const i = p*4;
    data[i]=data[i+1]=data[i+2]=g;
    data[i+3]=255;
  };

  const headerBytes = new TextEncoder().encode(JSON.stringify(header));
  const headerSize = headerBytes.length;

  write(0,(headerSize>>24)&255);
  write(1,(headerSize>>16)&255);
  write(2,(headerSize>>8)&255);
  write(3,headerSize&255);

  for(let i=0;i<headerBytes.length;i++){
    write(4+i,headerBytes[i]);
  }

  const offset = 4096;

  for(let i=0;i<bytes.length;i++){
    write(offset+i,bytes[i]);
  }

  ctx.putImageData(img,0,0);
}

/* =========================
   COMPRESS AUDIO
========================= */
async function compressAudio(file){

  const ctx = new AudioContext();
  const buf = await ctx.decodeAudioData(await file.arrayBuffer());

  const sampleRate = 8000;

  const offline = new OfflineAudioContext(1, buf.duration*sampleRate, sampleRate);

  const src = offline.createBufferSource();
  src.buffer = buf;
  src.connect(offline.destination);
  src.start();

  const rendered = await offline.startRendering();

  return bufferToWav(rendered);
}

/* =========================
   WAV
========================= */
function bufferToWav(buffer){

  const length = buffer.length*2+44;
  const arr = new ArrayBuffer(length);
  const view = new DataView(arr);

  let offset=0;

  function writeString(s){
    for(let i=0;i<s.length;i++) view.setUint8(offset++,s.charCodeAt(i));
  }

  writeString("RIFF");
  view.setUint32(offset,36+buffer.length*2,true); offset+=4;
  writeString("WAVEfmt ");
  view.setUint32(offset,16,true); offset+=4;
  view.setUint16(offset,1,true); offset+=2;
  view.setUint16(offset,1,true); offset+=2;
  view.setUint32(offset,buffer.sampleRate,true); offset+=4;
  view.setUint32(offset,buffer.sampleRate*2,true); offset+=4;
  view.setUint16(offset,2,true); offset+=2;
  view.setUint16(offset,16,true); offset+=2;
  writeString("data");
  view.setUint32(offset,buffer.length*2,true); offset+=4;

  const ch = buffer.getChannelData(0);

  for(let i=0;i<ch.length;i++){
    let s=Math.max(-1,Math.min(1,ch[i]));
    view.setInt16(offset,s<0?s*0x8000:s*0x7FFF,true);
    offset+=2;
  }

  return new Uint8Array(arr);
}

/* =========================
   ENCODE
========================= */
async function encode(){

  const file = document.getElementById("audioInput").files[0];
  if(!file) return alert("اختر صوت");

  const wav = await compressAudio(file);

  const header = {
    magic:"ALM1",
    type:"audio",
    length:wav.length,
    checksum:checksum(wav),
    sampleRate:8000,
    payload_offset:4096
  };

  writeImage(wav,header);

  alert("✔ تم تحويل الصوت إلى صورة");
}

/* =========================
   SAVE
========================= */
function saveImage(){
  const canvas=document.getElementById("canvas");
  const a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download="alm-audio.png";
  a.click();
}

/* =========================
   DECODE
========================= */
function decode(){

  const file=document.getElementById("imageInput").files[0];
  if(!file) return alert("اختر صورة");

  const img=new Image();

  img.onload=()=>{

    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");

    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);

    const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

    const read=(p)=>255-data[p*4];

    const headerSize=
      (read(0)<<24)|(read(1)<<16)|(read(2)<<8)|read(3);

    let str="";
    for(let i=0;i<headerSize;i++){
      str+=String.fromCharCode(read(4+i));
    }

    const header=JSON.parse(str);

    const bytes=[];
    const offset=header.payload_offset;

    for(let i=0;i<header.length;i++){
      bytes.push(read(offset+i));
    }

    if(checksum(bytes)!==header.checksum){
      alert("⚠️ البيانات تالفة");
      return;
    }

    const blob=new Blob([new Uint8Array(bytes)],{type:"audio/wav"});

    const url=URL.createObjectURL(blob);

    const audio=document.createElement("audio");
    audio.controls=true;
    audio.src=url;

    const out=document.getElementById("output");
    out.innerHTML="";
    out.appendChild(audio);

    alert("✔ تم استرجاع الصوت");

  };

  img.src=URL.createObjectURL(file);
}

</script>

</body>
</html>
