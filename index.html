<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Xx21 FIXED AUDIO SYSTEM</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
.card{background:#111827;padding:15px;border-radius:12px;max-width:800px;margin:auto}
button,input{width:100%;margin-top:10px;padding:10px}
button{background:#0BA37F;color:#fff;border:none;border-radius:8px}
canvas{margin-top:15px;width:100%;border:1px solid #333}
</style>
</head>

<body>

<div class="card">
<h2>🎧 Xx21 FIXED (Lossless PCM Image Transport)</h2>

<input type="file" id="audioInput" accept="audio/*">
<button onclick="encode()">تحويل الصوت → صورة</button>

<button onclick="saveImage()">حفظ الصورة</button>

<hr>

<input type="file" id="imageInput" accept="image/png">
<button onclick="loadImage()">تحميل صورة</button>
<button onclick="decode()">استرجاع الصوت</button>

<canvas id="canvas"></canvas>
</div>

<script>

/* =========================
   PCM ENCODE (FIXED)
========================= */
async function encode(){

  const file = document.getElementById("audioInput").files[0];
  if(!file) return alert("اختر صوت");

  const ctx = new AudioContext();
  const buf = await ctx.decodeAudioData(await file.arrayBuffer());

  const offline = new OfflineAudioContext(1, buf.length, buf.sampleRate);

  const src = offline.createBufferSource();
  src.buffer = buf;
  src.connect(offline.destination);
  src.start();

  const rendered = await offline.startRendering();

  const ch = rendered.getChannelData(0);

  // 16-bit PCM
  const pcm = new Int16Array(ch.length);

  for(let i=0;i<ch.length;i++){
    let s = Math.max(-1, Math.min(1, ch[i]));
    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  const bytes = new Uint8Array(pcm.buffer);

  const canvas = document.getElementById("canvas");
  const size = Math.ceil(Math.sqrt(bytes.length / 4));

  canvas.width = size;
  canvas.height = size;

  const ctx2 = canvas.getContext("2d");
  const img = ctx2.createImageData(size,size);

  // IMPORTANT: store 4 bytes per pixel
  for(let i=0;i<bytes.length;i++){
    img.data[i] = bytes[i];
  }

  ctx2.putImageData(img,0,0);

  alert("✔ تم التحويل بنجاح");
}


/* =========================
   SAVE IMAGE
========================= */
function saveImage(){
  const canvas = document.getElementById("canvas");
  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = "audio.png";
  a.click();
}


/* =========================
   LOAD IMAGE
========================= */
function loadImage(){
  const file = document.getElementById("imageInput").files[0];
  if(!file) return;

  const img = new Image();

  img.onload = ()=>{
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);
  };

  img.src = URL.createObjectURL(file);
}


/* =========================
   DECODE (FIXED)
========================= */
function decode(){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

  // reconstruct bytes
  const bytes = new Uint8Array(data.length);

  for(let i=0;i<data.length;i++){
    bytes[i] = data[i];
  }

  const pcm = new Int16Array(bytes.buffer);

  const float = new Float32Array(pcm.length);

  for(let i=0;i<pcm.length;i++){
    float[i] = pcm[i] / 0x7FFF;
  }

  const audioCtx = new AudioContext();
  const buffer = audioCtx.createBuffer(1, float.length, 8000);

  buffer.copyToChannel(float,0);

  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(audioCtx.destination);
  src.start();

  alert("▶ تم تشغيل الصوت");
}

</script>

</body>
</html>
