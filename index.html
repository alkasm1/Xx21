<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ALM Xx21 Demo</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { margin-bottom: 10px; }
    pre { background: #f0f0f0; padding: 10px; border-radius: 6px; }
    button { margin: 5px 0; padding: 8px 14px; }
  </style>
</head>

<body>

<h1>ALM Xx21 Demo</h1>

<!-- ========================= -->
<!-- AUDIO DEMO -->
<!-- ========================= -->
<h3>🎧 Audio Transport</h3>
<input type="file" id="audioInput" accept="audio/*">
<button onclick="runAudio()">Run Audio Demo</button>

<!-- ========================= -->
<!-- SYSTEM TEST -->
<!-- ========================= -->
<h3>📦 System Test</h3>
<button onclick="runALMSystemTest()">Run System Test</button>

<!-- ========================= -->
<!-- CERTIFICATION -->
<!-- ========================= -->
<h3>🔐 Certification</h3>
<button onclick="runCert()">Run Certification</button>

<!-- ========================= -->
<!-- ACL DEMO -->
<!-- ========================= -->
<h3>🔐 Secure ACL</h3>
<button onclick="runSecureACL()">Run Secure ACL</button>

<!-- ========================= -->
<!-- OUTPUT -->
<!-- ========================= -->
<pre id="output"></pre>

<!-- ========================= -->
<!-- SCRIPTS (ORDER مهم جدًا) -->
<!-- ========================= -->

<!-- 1) Kernel -->
<script src="./src/alm_kernel.js"></script>

<!-- 2) Transport -->
<script src="./src/transports/xx21_transport.js"></script>

<!-- 3) Certifier -->
<script src="./src/alm_certifier.js"></script>

<!-- 4) System Test -->
<script src="./src/alm_system_test.js"></script>

<!-- 5) ACL Secure -->
<script src="./src/acl/alm_acl_secure.js"></script>

<!-- 6) Demo -->
<script src="./demo/demo.js"></script>

<!-- ========================= -->
<!-- INLINE FUNCTIONS -->
<!-- ========================= -->

<script>
async function runCert() {
  const out = document.getElementById("output");
  out.textContent = "Running certification...\n";

  try {
    const res = await certifyALMTransport();
    out.textContent += JSON.stringify(res, null, 2);
  } catch (e) {
    out.textContent = "ERROR:\n" + e.message;
  }
}
</script>

</body>
</html>
